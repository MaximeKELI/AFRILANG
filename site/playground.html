<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AFRILANG Playground</title>
  <link rel="icon" href="/icon.png" type="image/png">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="brand">
    <img src="/icon.png" alt="" class="logo" width="48" height="48">
    <div>
      <h1><a href="/">AFRILANG</a> Playground</h1>
      <p>Write AFRILANG code and run it live</p>
    </div>
  </header>
  <main class="playground">
    <div class="playground-grid">
      <section class="panel">
        <div class="panel-header">
          <label for="examples">Example</label>
          <select id="examples">
            <option value="hello">Hello World</option>
            <option value="natural">Natural syntax</option>
            <option value="oop">Classes</option>
            <option value="advanced">Enums &amp; match</option>
            <option value="generics">Generics</option>
            <option value="wasm">WASM demo</option>
          </select>
        </div>
        <textarea id="editor" spellcheck="false"></textarea>
        <div class="toolbar">
          <button id="run" type="button">Run</button>
          <button id="runInstant" type="button" class="secondary">Run (instant)</button>
          <button id="runWasm" type="button" class="secondary">Run WASM (server)</button>
          <button id="runWasmBrowser" type="button" class="secondary">Run in browser</button>
          <button id="fmt" type="button" class="secondary">Format</button>
          <span id="status"></span>
        </div>
      </section>
      <section class="panel">
        <div class="panel-header">Output</div>
        <pre id="output">(click Run)</pre>
      </section>
    </div>
  </main>
  <script src="/wasm-runner.js"></script>
  <script src="/compiler-client.js"></script>
  <script src="/playground.js"></script>
</body>
</html>
