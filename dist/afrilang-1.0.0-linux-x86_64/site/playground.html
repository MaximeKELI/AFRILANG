<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Playground AFRILANG — exécutez du code en ligne (natif, WASM, JS instant).">
  <title>Playground — AFRILANG</title>
  <link rel="icon" href="/icon.png" type="image/png">
  <link rel="stylesheet" href="/style.css">
</head>
<body data-page="playground" class="playground-page">
  <div data-afr-shell></div>

  <main class="page">
    <header class="playground-header">
      <h1>Playground</h1>
      <p class="muted">Écrivez du code AFRILANG et exécutez-le en direct — natif, WASM ou JS instantané.</p>
    </header>

    <div class="playground-grid">
      <section class="panel">
        <div class="panel-header">
          <label for="examples">Exemple</label>
          <select id="examples">
            <option value="hello">Hello World</option>
            <option value="natural">Natural syntax</option>
            <option value="oop">Classes</option>
            <option value="advanced">Enums &amp; match</option>
            <option value="generics">Generics</option>
            <option value="wasm">WASM demo</option>
          </select>
        </div>
        <textarea id="editor" spellcheck="false"></textarea>
        <div class="toolbar">
          <button id="run" type="button">Run</button>
          <button id="runInstant" type="button" class="secondary">Run (instant)</button>
          <button id="runWasm" type="button" class="secondary">Run WASM</button>
          <button id="runWasmBrowser" type="button" class="secondary">Browser</button>
          <button id="fmt" type="button" class="secondary">Format</button>
          <span id="status"></span>
        </div>
      </section>
      <section class="panel">
        <div class="panel-header">Output</div>
        <pre id="output">(click Run)</pre>
      </section>
    </div>
  </main>

  <footer data-afr-footer></footer>
  <script src="/wasm-runner.js"></script>
  <script src="/compiler-client.js"></script>
  <script src="/site.js"></script>
  <script src="/playground.js"></script>
</body>
</html>
