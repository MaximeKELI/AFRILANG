services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: afrilang
      POSTGRES_USER: afrilang
      POSTGRES_PASSWORD: afrilang
    ports:
      - "5433:5432"
    volumes:
      - afrilang_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afrilang -d afrilang"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  afrilang_pg:
