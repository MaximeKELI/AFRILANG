name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            shell: bash
          - os: ubuntu-24.04-arm
            platform: linux-arm64
            shell: bash
          - os: macos-14
            platform: macos-arm64
            shell: bash
          - os: macos-13
            platform: macos-x86_64
            shell: bash
          - os: windows-latest
            platform: windows-x86_64
            shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        if: runner.os == 'Windows'
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-openssl

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake g++ build-essential libssl-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install openssl@3

      - name: Configure & build (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)

      - name: Configure & build (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release \
            -DOPENSSL_ROOT_DIR="$(brew --prefix openssl@3)"
          cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Configure & build (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -S . -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)

      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: |
          ./build/afrilang version
          ./build/afrilang run examples/hello.afr

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        run: |
          ./build/afrilang.exe version
          ./build/afrilang.exe run examples/hello.afr

      - name: Package release
        shell: bash
        run: |
          chmod +x scripts/package-release.sh
          scripts/package-release.sh "${{ steps.ver.outputs.version }}" "${{ matrix.platform }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: afrilang-${{ steps.ver.outputs.version }}-${{ matrix.platform }}
          path: |
            dist/afrilang-${{ steps.ver.outputs.version }}-${{ matrix.platform }}.tar.gz
            dist/afrilang-${{ steps.ver.outputs.version }}-${{ matrix.platform }}.zip

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List assets
        run: find dist -type f \( -name '*.tar.gz' -o -name '*.zip' \) | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: AFRILANG ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
