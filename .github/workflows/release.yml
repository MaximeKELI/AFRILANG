name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            cmake_extra: -DCMAKE_BUILD_TYPE=Release
          - os: ubuntu-24.04-arm
            platform: linux-arm64
            cmake_extra: -DCMAKE_BUILD_TYPE=Release
          - os: macos-14
            platform: macos-arm64
            cmake_extra: -DCMAKE_BUILD_TYPE=Release
          - os: macos-13
            platform: macos-x86_64
            cmake_extra: -DCMAKE_BUILD_TYPE=Release
          - os: windows-latest
            platform: windows-x86_64
            cmake_extra: -DCMAKE_BUILD_TYPE=Release

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ build-essential libssl-dev

      - name: Configure & build (Unix)
        if: runner.os != 'Windows'
        run: |
          cmake -S . -B build ${{ matrix.cmake_extra }}
          cmake --build build -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: Configure & build (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 ${{ matrix.cmake_extra }}
          cmake --build build --config Release -j

      - name: Smoke test
        if: runner.os != 'Windows'
        run: |
          ./build/afrilang version
          ./build/afrilang run examples/hello.afr

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          ./build/Release/afrilang.exe version || ./build/afrilang.exe version
          BIN=$(test -f ./build/Release/afrilang.exe && echo ./build/Release/afrilang.exe || echo ./build/afrilang.exe)
          "$BIN" run examples/hello.afr

      - name: Package release
        shell: bash
        run: |
          chmod +x scripts/package-release.sh
          scripts/package-release.sh "${{ steps.ver.outputs.version }}" "${{ matrix.platform }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: afrilang-${{ steps.ver.outputs.version }}-${{ matrix.platform }}
          path: dist/afrilang-${{ steps.ver.outputs.version }}-${{ matrix.platform }}.*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List assets
        run: find dist -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: AFRILANG ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
