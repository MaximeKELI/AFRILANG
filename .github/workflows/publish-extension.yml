name: Publish Extension

on:
  workflow_dispatch:
  push:
    tags:
      - 'vscode-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-afrilang

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Read version
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm install

      - name: Package VSIX
        run: npx @vscode/vsce package --out "afrilang-${{ steps.ver.outputs.version }}.vsix"

      - name: Publish to VS Code Marketplace
        if: env.VSCE_PAT != ''
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish -i "afrilang-${{ steps.ver.outputs.version }}.vsix"

      - name: Publish to Open VSX
        if: env.OVSX_PAT != ''
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx ovsx publish "afrilang-${{ steps.ver.outputs.version }}.vsix" -p "$OVSX_PAT"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: afrilang-vscode-extension
          path: vscode-afrilang/afrilang-*.vsix
