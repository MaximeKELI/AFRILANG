name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [g++, clang++]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ clang build-essential lcov libsdl2-dev libsdl2-ttf-dev libpcre2-dev nodejs

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_COMPILER=${{ matrix.compiler }} -DAFRILANG_ENABLE_COVERAGE=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Unit tests
        run: cd build && ctest --output-on-failure -R compiler_unit_tests

      - name: Integration tests (examples)
        run: ./build/afrilang test --examples .

      - name: Compiler specs + core stdlib
        run: ./build/afrilang test --specs .

      - name: Conformance ASan+UBSan
        if: matrix.compiler == 'g++'
        run: bash scripts/check_asan_conformance.sh

      - name: Sandbox seccomp smoke (Linux)
        if: matrix.compiler == 'g++'
        run: bash scripts/check_sandbox_seccomp.sh

      - name: Tooling smoke (version/check/fmt/LSP)
        if: matrix.compiler == 'g++'
        run: bash scripts/check_tooling_smoke.sh

      - name: Ecosystem smoke (init / pkg / test)
        run: |
          ./build/afrilang init smoke_app
          cd smoke_app
          ../build/afrilang pkg add math
          ../build/afrilang pkg install
          ../build/afrilang test
          cd ..
          ./build/afrilang pkg init smoke_lib
          test -f smoke_lib/manifest.toml
          cd smoke_lib
          ../build/afrilang pkg test
          ../build/afrilang pkg publish . --remote | grep -q 'Publication distante'
          test -f registry-entry.json
          cd ..
          ./build/afrilang init path_app
          ./build/afrilang pkg init local_dep
          cd path_app
          ../build/afrilang pkg add local_dep --path ../local_dep
          ../build/afrilang pkg install
          grep -q 'source = "path"' afrilang.lock
          cd ..
          # remote-index: published registry path
          test -f registry/index.json
          ./build/afrilang pkg sync
          test -f packages/remote-index.json
          ./build/afrilang pkg search math | grep -q math
          # sync from published in-tree registry via file://
          export AFRILANG_REGISTRY_URL="file://$PWD/registry/index.json"
          ./build/afrilang pkg sync | grep -q 'Index distant'
          export AFRILANG_REGISTRY_URL="file://$PWD/packages/remote-index.example.json"
          ./build/afrilang pkg sync
          ./build/afrilang pkg search example_remote | grep -q example_remote
          rm -f packages/remote-index.json
          unset AFRILANG_REGISTRY_URL
          bash scripts/check_docs_honesty.sh
          bash scripts/check_blessed_quality.sh
          ./build/afrilang test --conformance
          bash scripts/check_conformance_negative.sh
          # http template uses std/web
          ROOT="$PWD"
          rm -rf /tmp/demo_http_p9
          ./build/afrilang pkg init /tmp/demo_http_p9 --template http
          grep -q 'std/web' /tmp/demo_http_p9/*.afr
          cd /tmp/demo_http_p9 && "$ROOT/build/afrilang" pkg test
          cd "$ROOT"
          rm -rf /tmp/demo_http_p9
          rm -rf smoke_app smoke_lib path_app local_dep

      - name: Blessed packages smoke (subset)
        run: |
          ./build/afrilang pkg reindex
          ./build/afrilang pkg search | grep -q '★'
          ./build/afrilang pkg search math | grep -q '#math'
          # all blessed packages must be signed when trusted_keys are present
          python3 - <<'PY'
          import json
          from pathlib import Path
          blessed = json.loads(Path("packages/blessed.json").read_text())
          if isinstance(blessed, dict):
              blessed = blessed.get("packages", [])
          sigs = json.loads(Path("packages/signatures.json").read_text())
          missing = [n for n in blessed if n not in sigs or not sigs[n]]
          assert not missing, f"unsigned blessed: {missing}"
          print(f"blessed signatures ok: {len(blessed)}")
          PY
          ROOT="$PWD"
          rm -rf /tmp/demo_cli_p5
          ./build/afrilang pkg init /tmp/demo_cli_p5 --template cli
          cd /tmp/demo_cli_p5
          "$ROOT/build/afrilang" pkg test
          cd "$ROOT"
          for p in math strx flagx percentx urlx listx jsonx clampx; do
            ./build/afrilang run "packages/$p/tests/smoke.afr"
          done
          ./build/afrilang run tests/specs/module_name_collision.afr
          ./build/afrilang run tests/specs/module_result.afr
          ./build/afrilang run tests/specs/maps.afr
          ./build/afrilang run tests/stdlib/web.afr
          for p in math strx urlx queryx bannerx datetime strings; do
            ./build/afrilang pkg verify "$p"
          done
          rm -rf examples/apps/pkg_transitive/vendor examples/apps/pkg_transitive/afrilang.lock
          cd examples/apps/pkg_transitive
          "$ROOT/build/afrilang" pkg install
          grep -q 'name = "urlx"' afrilang.lock
          "$ROOT/build/afrilang" run src/main.afr
          cd "$ROOT"
          rm -rf examples/apps/pkg_banner_only/vendor examples/apps/pkg_banner_only/afrilang.lock
          cd examples/apps/pkg_banner_only
          "$ROOT/build/afrilang" pkg install
          grep -q 'name = "flagx"' afrilang.lock
          "$ROOT/build/afrilang" run src/main.afr
          cd "$ROOT"
          # catalog isolation: core-only program must not pull simple_libs.hpp
          printf '%s\n' 'import "std/math"' 'use math' 'say abs(1)' > /tmp/afr_core_only.afr
          rm -f afr_core_only.generated.cpp
          ./build/afrilang run /tmp/afr_core_only.afr
          test -f afr_core_only.generated.cpp
          ! grep -q 'simple_libs.hpp' afr_core_only.generated.cpp
          # complex_libs quarantine: stub gate without include of optional blob for core
          ! grep -q 'optional/complex_libs.hpp' afr_core_only.generated.cpp
          test -f runtime/complex_libs.hpp
          test -f runtime/optional/complex_libs.hpp
          grep -q 'AFRILANG_ENABLE_COMPLEX_LIBS' runtime/complex_libs.hpp
      - name: LSP diagnostic smoke test
        run: python3 scripts/test_lsp_diag.py

      - name: Benchmark (informational)
        if: matrix.compiler == 'g++'
        run: bash scripts/benchmark.sh

      - name: JS playground smoke
        run: bash scripts/check_js_playground.sh

      - name: Coverage report
        if: matrix.compiler == 'g++'
        run: |
          cd build
          lcov --capture --directory . --output-file coverage.info
          lcov --remove coverage.info '/usr/*' --output-file coverage.info
          lcov --summary coverage.info

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docker build
        run: docker build -t afrilang:ci .

  wasm-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ build-essential nodejs

      - name: Setup Emscripten
        run: |
          git clone https://github.com/emscripten-core/emsdk.git /tmp/emsdk
          cd /tmp/emsdk
          ./emsdk install 3.1.57
          ./emsdk activate 3.1.57

      - name: Build AFRILANG
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release && cmake --build build -j$(nproc)

      - name: WASM compile and run tier8 + conformance subset
        run: |
          source /tmp/emsdk/emsdk_env.sh
          ./build/afrilang run examples/tier8_demo.afr --target wasm32 --run
          ./build/afrilang run examples/tier8_stdlib.afr --target wasm32 --run
          ./build/afrilang run examples/wasm_core_smoke.afr --target wasm32 --run
          ./build/afrilang run tests/conformance/text_bool.afr --target wasm32 --run
          ./build/afrilang run tests/conformance/collections_basic.afr --target wasm32 --run
          ./build/afrilang run tests/conformance/functions_basic.afr --target wasm32 --run
          ./build/afrilang run tests/conformance/strength_reduce.afr --target wasm32 --run
          ./build/afrilang run tests/conformance/while_repeat.afr --target wasm32 --run
          ./build/afrilang run tests/stdlib/str.afr --target wasm32 --run
          ./build/afrilang run tests/stdlib/json.afr --target wasm32 --run
          ./build/afrilang run tests/stdlib/collections.afr --target wasm32 --run
          ./build/afrilang run tests/stdlib/math.afr --target wasm32 --run
          ./build/afrilang run tests/stdlib/stats.afr --target wasm32 --run
          ./build/afrilang run tests/stdlib/path.afr --target wasm32 --run
          ./build/afrilang run tests/stdlib/re.afr --target wasm32 --run

      - name: Check Emscripten script
        run: |
          source /tmp/emsdk/emsdk_env.sh
          bash scripts/check_emscripten.sh

  # Secondary hosts — smoke only (not primary / not stdlib-FFI parity). See docs/PLATFORM.md.
  secondary-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure and build
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release && cmake --build build -j$(sysctl -n hw.ncpu)
      - name: Version + conformance subset
        run: |
          ./build/afrilang version
          ./build/afrilang test --conformance
          bash scripts/check_conformance_negative.sh

  secondary-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure and build
        shell: bash
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release && cmake --build build --config Release -j$(nproc 2>/dev/null || echo 2)
      - name: Version + conformance subset
        shell: bash
        run: |
          BIN=./build/afrilang
          if [[ -x ./build/Release/afrilang.exe ]]; then BIN=./build/Release/afrilang.exe; fi
          if [[ -x ./build/afrilang.exe ]]; then BIN=./build/afrilang.exe; fi
          "$BIN" version
          AFRILANG_BIN="$BIN" "$BIN" test --conformance
          AFRILANG_BIN="$BIN" bash scripts/check_conformance_negative.sh
