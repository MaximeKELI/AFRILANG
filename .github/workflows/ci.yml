name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [g++, clang++]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ clang build-essential lcov libsdl2-dev libsdl2-ttf-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_COMPILER=${{ matrix.compiler }} -DAFRILANG_ENABLE_COVERAGE=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Unit tests
        run: cd build && ctest --output-on-failure -R compiler_unit_tests

      - name: Integration tests (examples)
        run: ./build/afrilang test --examples .

      - name: Ecosystem smoke (init / pkg / test)
        run: |
          ./build/afrilang init smoke_app
          cd smoke_app
          ../build/afrilang pkg add math
          ../build/afrilang pkg install
          ../build/afrilang test
          cd ..
          ./build/afrilang pkg init smoke_lib
          test -f smoke_lib/manifest.toml
          cd smoke_lib
          ../build/afrilang pkg test
          ../build/afrilang pkg publish . --remote | grep -q 'Publication distante'
          test -f registry-entry.json
          cd ..
          ./build/afrilang init path_app
          ./build/afrilang pkg init local_dep
          cd path_app
          ../build/afrilang pkg add local_dep --path ../local_dep
          ../build/afrilang pkg install
          grep -q 'source = "path"' afrilang.lock
          cd ..
          # remote-index merge into search
          cp packages/remote-index.example.json packages/remote-index.json
          ./build/afrilang pkg search example_remote | grep -q example_remote
          rm -f packages/remote-index.json
          rm -rf smoke_app smoke_lib path_app local_dep

      - name: LSP diagnostic smoke test
        run: python3 scripts/test_lsp_diag.py

      - name: Benchmark (informational)
        if: matrix.compiler == 'g++'
        run: bash scripts/benchmark.sh

      - name: Coverage report
        if: matrix.compiler == 'g++'
        run: |
          cd build
          lcov --capture --directory . --output-file coverage.info
          lcov --remove coverage.info '/usr/*' --output-file coverage.info
          lcov --summary coverage.info

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docker build
        run: docker build -t afrilang:ci .

  wasm-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ build-essential nodejs

      - name: Setup Emscripten
        run: |
          git clone https://github.com/emscripten-core/emsdk.git /tmp/emsdk
          cd /tmp/emsdk
          ./emsdk install 3.1.57
          ./emsdk activate 3.1.57

      - name: Build AFRILANG
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release && cmake --build build -j$(nproc)

      - name: WASM compile and run tier8
        run: |
          source /tmp/emsdk/emsdk_env.sh
          ./build/afrilang run examples/tier8_demo.afr --target wasm32 --run

      - name: Check Emscripten script
        run: |
          source /tmp/emsdk/emsdk_env.sh
          bash scripts/check_emscripten.sh
